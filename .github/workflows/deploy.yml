# Build and deploy Spring Boot native image to App Engine Flexible
name: Build/Deploy top-leader-be (Native)

on:
  push:
    branches: [ "develop", "main" ]
  pull_request:
    branches: [ "develop", "main" ]

env:
  PROJECT_ID: topleader-394306
  REGION: europe-west3
  GAR_LOCATION: europe-west3-docker.pkg.dev
  REPOSITORY: top-leader-images

jobs:
  # Build and test with standard JVM
  build:
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'corretto'
        cache: maven

    - name: Build and Test with Maven
      run: mvn -B verify --file pom.xml

  # Build native image and deploy to QA
  deploy-qa:
    needs: build
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    env:
      SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD_QA }}
      SPRING_MAIL_PASSWORD: ${{ secrets.SPRING_MAIL_PASSWORD }}
      TOP_LEADER_CALENDLY_CLIENT_SECRETS: ${{ secrets.TOP_LEADER_CALENDLY_CLIENT_SECRETS }}
      GOOGLE_CLIENT_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_CLIENT_SECRET }}
      SPRING_AI_OPENAI_APIKEY: ${{ secrets.SPRING_AI_OPENAI_APIKEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Replace secrets in app-qa.yaml
        run: |
          sed -i 's|\${SPRING_DATASOURCE_PASSWORD}|'"$SPRING_DATASOURCE_PASSWORD"'|g' src/main/appengine/app-qa.yaml
          sed -i 's|\${SPRING_MAIL_PASSWORD}|'"$SPRING_MAIL_PASSWORD"'|g' src/main/appengine/app-qa.yaml
          sed -i 's|\${TOP_LEADER_CALENDLY_CLIENT_SECRETS}|'"$TOP_LEADER_CALENDLY_CLIENT_SECRETS"'|g' src/main/appengine/app-qa.yaml
          sed -i 's|\${GOOGLE_CLIENT_CLIENT_SECRET}|'"$GOOGLE_CLIENT_CLIENT_SECRET"'|g' src/main/appengine/app-qa.yaml
          sed -i 's|\${SPRING_AI_OPENAI_APIKEY}|'"$SPRING_AI_OPENAI_APIKEY"'|g' src/main/appengine/app-qa.yaml

      - name: Cloud Authentication
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          version: '>= 510.0.0'

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}

      - name: Build Native Docker Image
        run: |
          docker build \
            -t ${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/top-leader-qa:${{ github.sha }} \
            -t ${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/top-leader-qa:latest \
            -f Dockerfile .
        timeout-minutes: 60

      - name: Push Docker Image to Artifact Registry
        run: |
          docker push ${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/top-leader-qa:${{ github.sha }}
          docker push ${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/top-leader-qa:latest

      - name: Copy Dockerfile to appengine directory
        run: cp Dockerfile src/main/appengine/Dockerfile

      - name: Deploy to App Engine Flex QA
        run: |
          gcloud app deploy src/main/appengine/app-qa.yaml \
            --project=${{ env.PROJECT_ID }} \
            --version=$(git rev-parse --short "$GITHUB_SHA") \
            --image-url=${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/top-leader-qa:${{ github.sha }} \
            --promote \
            --quiet

  # Build native image and deploy to PROD
  deploy-prod:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD_PROD }}
      SPRING_MAIL_PASSWORD: ${{ secrets.SPRING_MAIL_PASSWORD }}
      TOP_LEADER_CALENDLY_CLIENT_SECRETS: ${{ secrets.TOP_LEADER_CALENDLY_CLIENT_SECRETS }}
      GOOGLE_CLIENT_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_CLIENT_SECRET }}
      SPRING_AI_OPENAI_APIKEY: ${{ secrets.SPRING_AI_OPENAI_APIKEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Replace secrets in app-prod.yaml
        run: |
          sed -i 's|\${SPRING_DATASOURCE_PASSWORD_PROD}|'"$SPRING_DATASOURCE_PASSWORD"'|g' src/main/appengine/app-prod.yaml
          sed -i 's|\${SPRING_MAIL_PASSWORD}|'"$SPRING_MAIL_PASSWORD"'|g' src/main/appengine/app-prod.yaml
          sed -i 's|\${TOP_LEADER_CALENDLY_CLIENT_SECRETS}|'"$TOP_LEADER_CALENDLY_CLIENT_SECRETS"'|g' src/main/appengine/app-prod.yaml
          sed -i 's|\${GOOGLE_CLIENT_CLIENT_SECRET}|'"$GOOGLE_CLIENT_CLIENT_SECRET"'|g' src/main/appengine/app-prod.yaml
          sed -i 's|\${SPRING_AI_OPENAI_APIKEY}|'"$SPRING_AI_OPENAI_APIKEY"'|g' src/main/appengine/app-prod.yaml

      - name: Cloud Authentication
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          version: '>= 510.0.0'

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}

      - name: Build Native Docker Image
        run: |
          docker build \
            -t ${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/top-leader-prod:${{ github.sha }} \
            -t ${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/top-leader-prod:latest \
            -f Dockerfile .
        timeout-minutes: 60

      - name: Push Docker Image to Artifact Registry
        run: |
          docker push ${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/top-leader-prod:${{ github.sha }}
          docker push ${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/top-leader-prod:latest

      - name: Copy Dockerfile to appengine directory
        run: cp Dockerfile src/main/appengine/Dockerfile

      - name: Deploy to App Engine Flex PROD
        run: |
          gcloud app deploy src/main/appengine/app-prod.yaml \
            --project=${{ env.PROJECT_ID }} \
            --version=$(git rev-parse --short "$GITHUB_SHA") \
            --image-url=${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/top-leader-prod:${{ github.sha }} \
            --promote \
            --quiet
