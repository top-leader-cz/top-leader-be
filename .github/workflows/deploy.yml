name: Build/Deploy top-leader-be

on:
  push:
    tags:
      - 'qa-deploy'
      - 'qa-deploy-*'
      - 'release-v*.*.*'
  pull_request:
    branches: [ "develop", "main" ]

jobs:
  build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Dagger build pipeline
        uses: dagger/dagger-for-github@v7
        with:
          version: "latest"
          module: ./ci
          call: --src=.. build

  deploy-qa:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/qa-deploy')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Dagger QA deploy
        uses: dagger/dagger-for-github@v7
        with:
          version: "latest"
          module: ./ci
          call: >-
            --src=..
            deploy-qa
            --gcp-credentials=env:GCP_CREDENTIALS
            --short-sha=${{ github.sha }}
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}

  deploy-prod:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/release-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set release version
        run: echo "VERSION=${GITHUB_REF#refs/tags/release-v}" >> $GITHUB_ENV

      - name: Run Dagger PROD deploy
        uses: dagger/dagger-for-github@v7
        with:
          version: "latest"
          module: ./ci
          call: >-
            --src=..
            deploy-prod
            --gcp-credentials=env:GCP_CREDENTIALS
            --version=${{ env.VERSION }}
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}

      - name: Create GitHub Release with changelog
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --generate-notes
