runtime: custom
env: flex
service: prod

# Resources for Flex environment (production)
resources:
  cpu: 2
  memory_gb: 4
  disk_size_gb: 10

# Scaling configuration
automatic_scaling:
  min_num_instances: 1
  max_num_instances: 4
  cpu_utilization:
    target_utilization: 0.65

# Health checks for native image (fast startup)
liveness_check:
  path: "/_ah/start"
  initial_delay_sec: 10
  check_interval_sec: 30
  timeout_sec: 10
  failure_threshold: 3
  success_threshold: 1

readiness_check:
  path: "/_ah/warmup"
  check_interval_sec: 10
  timeout_sec: 10
  failure_threshold: 3
  success_threshold: 1
  app_start_timeout_sec: 120

# Cloud SQL connection
beta_settings:
  cloud_sql_instances: "topleader-394306:europe-west3:top-leader-db"

env_variables:
  SPRING_PROFILES_ACTIVE: "prod"
  SPRING_DATASOURCE_URL: "jdbc:postgresql:///top_leader_prod"
  SPRING_DATASOURCE_USERNAME: "top-leader-prod"
  SPRING_DATASOURCE_PASSWORD: "${SPRING_DATASOURCE_PASSWORD_PROD}"
  SPRING_MAIL_PASSWORD: "${SPRING_MAIL_PASSWORD}"
  SPRING_MAIL_USERNAME: "topleaderplatform@topleader.io"
  SPRING_MAIL_HOST: "smtp.gmail.com"
  SPRING_MAIL_PORT: "587"
  SPRING_AI_OPENAI_APIKEY: "${SPRING_AI_OPENAI_APIKEY}"

  # Calendly
  TOP_LEADER_CALENDLY_CLIENT_ID: "PJ2FbDI-YAyzEJya2H4RqHv_Sv0F-Hl0d-i93FkAuH8"
  TOP_LEADER_CALENDLY_CLIENT_SECRETS: "${TOP_LEADER_CALENDLY_CLIENT_SECRETS}"

  # Google OAuth
  GOOGLE_CLIENT_CLIENT_ID: "572595541175-n58eajajt5iqc5rsn25rv2mt8iejojsi.apps.googleusercontent.com"
  GOOGLE_CLIENT_CLIENT_SECRET: "${GOOGLE_CLIENT_CLIENT_SECRET}"
